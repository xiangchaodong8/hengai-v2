server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # 静态资源：默认走 frontend/ 目录，支持单页应用回落
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 后端反向代理：所有 /api/* 转给 hengai_backend:8000
    # 关键：必须开启 SSE 流式相关配置，否则 /api/v1/chat 的 token 流会被 nginx
    # 缓冲到流结束才一次性发出，前端打字机效果消失。
    location /api/ {
        proxy_pass        http://hengai_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Connection        '';

        # ── SSE 流式响应设置（必填）──
        proxy_buffering   off;
        proxy_cache       off;
        chunked_transfer_encoding on;

        # 长连接心跳超时：DeepSeek 模型偶尔会出现 1~2 分钟的首字节延迟
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        send_timeout       600s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
