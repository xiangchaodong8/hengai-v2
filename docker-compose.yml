# HengAI V3.2 路 鍗曠偣鐪熺悊鏍堬紙浠?FastAPI :8000锛屾棤 nginx 鍓嶅簵锛?
# 鍞竴鍏ュ彛锛歨ttp://localhost:8000/static/index.html
# 鐪熺悊婧愶細  ./frontend 鈫?瀹瑰櫒 /app/frontend锛堟敼 HTML 绉掔骇鐢熸晥锛?
# API锛?    鍚屾簮鐩稿璺緞 /api/v1/...锛圓ppState API_BASE=""锛?
# 鍚姩锛歞ocker compose up -d --build
# 涓€閿彂杞︼細cd frontend && npm run docker:go-live
# 鏀圭爜锛氫繚瀛?frontend/ 鎴?backend/ 鍚庣‖鍒锋柊娴忚鍣?
# 鏇存崲 API Key锛氫慨鏀?backend/.env 鍚庢墽琛?docker compose restart backend 鍗冲彲锛屾棤闇€閲嶅缓

services:
  db:
    image: postgres:15
    container_name: hengai_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 30

  backend:
    build: ./backend
    container_name: hengai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/postgres
      WATCHFILES_FORCE_POLLING: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      HENGAI_RESONANCE_TARGET: "${HENGAI_RESONANCE_TARGET:-30}"
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend:ro
      - ./backend/.env:/app/.env:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 25s

  # nginx 鍓嶅簵宸插簾寮?鈥斺€?鍕垮啀鍚敤锛岄伩鍏嶄笌 /app/frontend 鍙岃矾寰勬墦鏋?
  # frontend:
  #   image: nginx:alpine
  #   ...

volumes:
  db_data:
