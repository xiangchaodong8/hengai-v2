<!-- ═══════════════════════════════════════════════════════════════════

<header id="hg-topbar">

  <!-- 左区：Logo + Phase Badge -->
  <div class="hg-tb-left">

      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 1.5L16 5V11.5C16 14.5 12.8 17 9 18C5.2 17 2 14.5 2 11.5V5L9 1.5Z"
              fill="rgba(0,229,160,0.12)" stroke="var(--accent)" stroke-width="1.3"/>
        <polyline points="5.5,9.2 8,11.5 12.5,6.8"
                  stroke="var(--accent-bright)" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

    </div>

    <div class="hg-tb-phase ph1" id="hg-phase-badge">
      <span class="hg-phase-dot"></span>

    <!-- 当前页面标题（各模块通过 data-page-title 覆盖） -->

  <!-- 中区：数据芯片 -->
  <div class="hg-tb-chips">
    <div class="hg-chip hg-chip-gm" title="GreenMark 绿印余额">
      <span class="hg-chip-ico">🪙</span>
      <span class="hg-chip-lbl">GM</span>

    </div>
    <div class="hg-chip hg-chip-risk" title="CBAM 风险敞口">
      <span class="hg-chip-lbl">风险</span>
      <span class="hg-chip-val hg-danger dyn-risk-eur">--</span>
    </div>
    <div class="hg-chip hg-chip-co2" title="总碳排放">
      <span class="hg-chip-lbl">tCO₂e</span>
      <span class="hg-chip-val dyn-tco2e-topbar">--</span>
    </div>
    <div class="hg-chip hg-chip-tok" title="算力剩余">
      <span class="hg-chip-lbl">Token</span>
      <span class="hg-chip-val dyn-tokens-left">--</span>
    </div>
  </div>

  <!-- 右区：用户头像 + 模式标识 -->
  <div class="hg-tb-right">
    <div class="hg-tb-mode-badge" id="hg-mode-badge" title="数据来源">MOCK</div>
    <div class="hg-tb-avatar" id="headerIdentityAvatar"
         onclick="window.location.href='HengAI_星火成就档案.html'"
         title="查看个人档案">
      ?
    </div>
    <span class="hg-tb-uname dyn-user-name" id="headerIdentityName">访客</span>
  </div>

</header>

<!-- ═══════════════════════════════════════════════════════════════════
     SHELL INIT SCRIPT  ——  自动高亮当前页菜单 + Phase badge 颜色
     ═══════════════════════════════════════════════════════════════════ -->
<script>
(function initShell() {
  /* ── 1. 页面 slug 识别 ── */
  const PAGE_SLUG_MAP = {
    '全域中心.html':                     'overview',
    'index.html':                        'overview',
    'HengAI_星火成就档案.html':          'achieve',
    'HengAI_CBAM测算工具.html':          'cbam',
    'HengAI_算力资源.html':              'compute',
    'HengAI_法规知识库.html':            'regulation',
    'HengAI_企业数字档案.html':          'company',
    'HengAI_供应链协同.html':            'supplychain',
    'HengAI_全域诊断报告.html':          'diagnosis',
    'HengAI_决策层呈送包生成器.html':    'package',
    'HengAI_荣誉体系.html':              'honor',
    'HengAI_Governance.html':            'governance',
    'HengAI_GM_Wallet.html':             'wallet',
    'HengAI_EU_Customs.html':            'customs',
    'HengAI_DLD_Credit.html':            'dld',
    'HengAI_ACF_Cert.html':              'acf',
  };
  const PAGE_TITLE_MAP = {
    'overview':    '全域总览',
    'achieve':     '星火成就档案',
    'cbam':        'CBAM 测算工具',
    'compute':     '算力资源',
    'regulation':  '法规知识库',
    'company':     '企业数字档案',
    'supplychain': '供应链协同',
    'diagnosis':   '全域诊断报告',
    'package':     '决策层呈送包',
    'honor':       '荣誉体系',
    'governance':  '共治委员会',
    'wallet':      'GM 绿印钱包',
    'customs':     '欧盟海关直连',
    'dld':         'DLD 绿色信贷',
    'acf':         'ACF 大湾区认证',
  };

  try {
    const fn      = decodeURIComponent((location.pathname.split('/').pop() || '').split('?')[0]);
    const slug    = PAGE_SLUG_MAP[fn] || '';
    const titleEl = document.getElementById('hg-page-title');

    /* 设置页面标题（若各模块页有 data-page-title attribute 则以模块为准） */
    if (titleEl && slug) {
      const override = document.body?.dataset?.pageTitle;
      titleEl.textContent = override || PAGE_TITLE_MAP[slug] || '全域合规中心';
    }

    /* 高亮侧边栏当前项 */
    if (slug) {
      document.querySelectorAll('#hg-sidebar .hg-nav[data-slug]').forEach(el => {
        el.classList.toggle('active', el.dataset.slug === slug);
      });
    }
  } catch(e) {}

  /* ── 2. Phase badge 颜色（由 AppState 初始化后的 syncAppState 负责更新，
           此处提供初始占位颜色） ── */
  function setPhaseColor(code) {
    const badge = document.getElementById('hg-phase-badge');
    if (!badge) return;
    badge.className = 'hg-tb-phase';
    if (code === 'Phase3') badge.classList.add('ph3');
    else if (code === 'Phase2') badge.classList.add('ph2');
    else badge.classList.add('ph1');
  }

  /* ── 3. 挂到 EventBus（AppState 可能晚于 shell 加载） ── */
  function hookEventBus() {
    if (!window.EventBus) return setTimeout(hookEventBus, 80);
    EventBus.on('STATE_SYNCED', s => {
      const phase = s?.flags?.currentPhase || 'Phase1';
      setPhaseColor(phase);

      const modeBadge = document.getElementById('hg-mode-badge');
      if (modeBadge) {
        const mode = s?._mode === 'live' ? 'LIVE' : 'MOCK';
        modeBadge.textContent = mode;
        modeBadge.style.background = mode === 'LIVE'
          ? 'rgba(0,229,160,0.15)'
          : 'rgba(167,139,250,0.15)';
        modeBadge.style.color = mode === 'LIVE' ? 'var(--accent)' : 'var(--purple)';
        modeBadge.style.borderColor = mode === 'LIVE'
          ? 'rgba(0,229,160,0.35)'
          : 'rgba(167,139,250,0.35)';
      }
    });
  }
  hookEventBus();

})();
</script>
